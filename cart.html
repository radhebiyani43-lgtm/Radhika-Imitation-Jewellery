<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shopping Cart | Radhika Imitation Jewellery</title>

    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header>

    <div class="logo">

        <img src="images/logo.png" alt="Logo">

        <h2>Radhika Imitation Jewellery</h2>

    </div>

    <nav>

        <ul>

            <li><a href="index.html">Home</a></li>

            <li><a href="cart.html">Cart</a></li>

        </ul>

    </nav>

</header>

<section class="cart-page">

      <h1>Your Shopping Cart</h1>
<table>

    <thead>

        <tr>

            <th>Product</th>

            <th>Price</th>

            <th>Quantity</th>

            <th>Total</th>

            <th>Action</th>

        </tr>

    </thead>

    <tbody id="cart-items">

    </tbody>

</table>

<h2 id="grand-total">Grand Total : ₹0</h2>
    
<button class="btn" onclick="clearCart()">
    Clear Cart
</button>

<button class="btn" onclick="goCheckout()">
Proceed to Checkout
</button>

</section>

<script src="js/cart.js"></script>

</body>
</html>
